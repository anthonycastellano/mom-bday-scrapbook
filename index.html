<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Mom!</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <!-- AOS Library -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <!-- Custom Styles -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/password.css">
</head>
<body>
    <div id="password-overlay" class="overlay" role="dialog" aria-modal="true" aria-labelledby="password-title">
        <div class="password-card">
            <h2 id="password-title">Open to celebrate</h2>
            <p class="password-copy">Enter the password to open Mom's birthday scrapbook.</p>
            <form id="password-form">
                <label class="sr-only" for="password-input">Password</label>
                <input id="password-input" name="password" type="password" autocomplete="current-password" required>
                <button id="submit-password" type="submit">Open Scrapbook</button>
                <p id="error-message" class="error-message" aria-live="polite"></p>
            </form>
        </div>
    </div>

    <header class="hero" data-aos="fade-down">
        <h1 class="hero-title">Happy Birthday, Mom! ❤️</h1>
        <p class="hero-subtitle">A collection of our favorite memories</p>
    </header>

    <main id="scrapbook-container" class="masonry-grid">
        <!-- Content will be injected here by js/main.js -->
    </main>

    <footer data-aos="fade-up">
        <p>Made with ❤️ for the best Mom</p>
    </footer>

    <!-- Dependencies -->
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <!-- Custom Logic -->
    <script src="js/main.js"></script>
</body>
</html>
